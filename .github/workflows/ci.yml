# =============================================================================
# CI Pipeline — Self-Hosted Runner
# Runs on push & PR to main
# Uses SQLite for tests (no Docker needed)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Validate Django Project
    runs-on: self-hosted
    if: ${{ false }}  # TEMP: CI paused

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .ci-venv
          . .ci-venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: |
          . .ci-venv/bin/activate
          python manage.py check --fail-level WARNING

      - name: Apply migrations (SQLite)
        run: |
          . .ci-venv/bin/activate
          python manage.py migrate --no-input

      - name: Verify no pending migrations
        run: |
          . .ci-venv/bin/activate
          python manage.py makemigrations --check --dry-run

      - name: Build JS/CSS bundles
        run: |
          . .ci-venv/bin/activate
          pip install rjsmin rcssmin
          python build_bundles.py

      - name: Test collectstatic
        run: |
          . .ci-venv/bin/activate
          python manage.py collectstatic --no-input

      - name: Run tests
        run: |
          . .ci-venv/bin/activate
          python manage.py test --verbosity=2 --no-input

      - name: Check for hardcoded SECRET_KEY
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -rn "SECRET_KEY\s*=" config/settings.py | grep -v "os.getenv" | grep -v "insecure" | grep -v "#"; then
            echo "ERROR: Hardcoded SECRET_KEY found!"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Cleanup
        if: always()
        run: rm -rf .ci-venv db.sqlite3 staticfiles/

      - name: CI Completed
        run: echo "CI passed successfully!"