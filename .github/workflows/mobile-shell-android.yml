name: Android Mobile Shell CI

on:
  workflow_dispatch:
    inputs:
      release_build:
        description: Build signed release APK/AAB (requires Android signing secrets)
        required: true
        type: boolean
        default: false
      release_version:
        description: Optional release label used for archived artifact names
        required: false
        type: string
        default: ''
      promote_latest_apk:
        description: Promote release APK to static/website/apk/adarsh-admin.apk naming policy
        required: true
        type: boolean
        default: false
  push:
    branches:
      - feature/mobile-pwa-shell-phase1
    paths:
      - mobile_shell_app/**
      - mobile_app/**
      - config/settings.py
      - .github/workflows/mobile-shell-android.yml
  pull_request:
    paths:
      - mobile_shell_app/**
      - mobile_app/**
      - config/settings.py
      - .github/workflows/mobile-shell-android.yml

jobs:
  android-shell-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile_shell_app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm deps
        working-directory: mobile_shell_app
        run: npm ci

      - name: Verify shell config
        working-directory: mobile_shell_app
        run: npm run verify

      - name: Build debug APK
        working-directory: mobile_shell_app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adarsh-panel-shell-debug-apk
          path: mobile_shell_app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare Android signing files
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_build }}
        working-directory: mobile_shell_app/android
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing signing secrets. Set ANDROID_KEYSTORE_B64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > release.keystore

          cat > key.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed release APK and AAB
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_build }}
        working-directory: mobile_shell_app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Promote release artifacts to latest + archive policy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_build && inputs.promote_latest_apk }}
        run: |
          RELEASE_APK="mobile_shell_app/android/app/build/outputs/apk/release/app-release.apk"
          RELEASE_AAB="mobile_shell_app/android/app/build/outputs/bundle/release/app-release.aab"

          test -f "$RELEASE_APK"
          test -f "$RELEASE_AAB"

          RELEASE_LABEL="${{ inputs.release_version }}"
          if [ -z "$RELEASE_LABEL" ]; then
            RELEASE_LABEL="run-${{ github.run_number }}-${{ github.run_attempt }}"
          fi

          mkdir -p static/website/apk/archive
          cp "$RELEASE_APK" static/website/apk/adarsh-admin.apk
          cp "$RELEASE_APK" "static/website/apk/archive/adarsh-admin-${RELEASE_LABEL}.apk"
          cp "$RELEASE_AAB" "static/website/apk/archive/adarsh-admin-${RELEASE_LABEL}.aab"

      - name: Upload signed release outputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: adarsh-panel-shell-release
          path: |
            mobile_shell_app/android/app/build/outputs/apk/release/app-release.apk
            mobile_shell_app/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload policy-path APK artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_build && inputs.promote_latest_apk }}
        uses: actions/upload-artifact@v4
        with:
          name: adarsh-panel-shell-release-policy-paths
          path: |
            static/website/apk/adarsh-admin.apk
            static/website/apk/archive/*.apk
            static/website/apk/archive/*.aab

      - name: Cleanup signing material
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.release_build }}
        working-directory: mobile_shell_app/android
        run: |
          rm -f key.properties release.keystore

  backend-shell-api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mobile shell backend tests
        run: |
          python manage.py test mobile_app.tests.MobileAppShellApiTests -v 2
