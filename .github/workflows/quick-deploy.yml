# =============================================================================
# Quick Deploy — Urgent/Hotfix Deployment (2-3 minutes)
# Manually triggered, SKIPS CI tests
# Use ONLY when confident code is safe
# =============================================================================

name: ⚡ Quick Deploy

on:
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: false
        type: boolean
      skip_collectstatic:
        description: 'Skip collectstatic (no CSS/JS/template changes)'
        required: false
        default: false
        type: boolean
      confirm:
        description: 'Type DEPLOY to confirm (skips CI tests!)'
        required: true
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  quick-deploy:
    name: ⚡ Quick Deploy to Production
    runs-on: self-hosted
    if: ${{ false }}  # TEMP: Quick deploy paused

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Quick Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"
            SERVICE_NAME="${{ secrets.SERVICE_NAME }}"
            PYTHON="$APP_DIR/venv/bin/python"
            PIP="$APP_DIR/venv/bin/pip"
            DEPLOY_LOG="$APP_DIR/deploy.log"
            SKIP_MIGRATIONS="${{ github.event.inputs.skip_migrations }}"
            SKIP_STATIC="${{ github.event.inputs.skip_collectstatic }}"

            echo "==================================================" | tee -a "$DEPLOY_LOG"
            echo "⚡ QUICK DEPLOY: $(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$DEPLOY_LOG"
            echo "==================================================" | tee -a "$DEPLOY_LOG"

            cd "$APP_DIR"

            PREV_COMMIT=$(git rev-parse HEAD)
            echo "Previous: $PREV_COMMIT" | tee -a "$DEPLOY_LOG"

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New: $NEW_COMMIT" | tee -a "$DEPLOY_LOG"

            # Quick requirements check
            REQS_CHANGED=$(git diff "$PREV_COMMIT" HEAD -- requirements.txt | wc -l)
            if [ "$REQS_CHANGED" -gt "0" ]; then
              echo "📦 Installing new dependencies..." | tee -a "$DEPLOY_LOG"
              $PIP install -r requirements.txt --quiet
            fi

            # Django check (fast, always run)
            echo "🔍 Django check..." | tee -a "$DEPLOY_LOG"
            if ! $PYTHON manage.py check --fail-level WARNING 2>/dev/null; then
              echo "❌ Check failed. Rollback..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              exit 1
            fi

            # Migrations (optional skip)
            if [ "$SKIP_MIGRATIONS" != "true" ]; then
              echo "🗄️ Running migrations..." | tee -a "$DEPLOY_LOG"
              $PYTHON manage.py migrate --no-input 2>/dev/null
            else
              echo "⏭️ Skipping migrations" | tee -a "$DEPLOY_LOG"
            fi

            # Build JS/CSS bundles
            if [ "$SKIP_STATIC" != "true" ]; then
              echo "📦 Building JS/CSS bundles..." | tee -a "$DEPLOY_LOG"
              $PYTHON build_bundles.py
            fi

            # Collectstatic (optional skip)
            if [ "$SKIP_STATIC" != "true" ]; then
              STATIC_CHANGED=$(git diff --name-only "$PREV_COMMIT" HEAD -- static/ templates/ | wc -l)
              if [ "$STATIC_CHANGED" -gt "0" ]; then
                echo "🎨 Collecting static files..." | tee -a "$DEPLOY_LOG"
                $PYTHON manage.py collectstatic --no-input 2>/dev/null
              else
                echo "⏭️ No static changes" | tee -a "$DEPLOY_LOG"
              fi
            else
              echo "⏭️ Skipping collectstatic" | tee -a "$DEPLOY_LOG"
            fi

            # Restart service
            echo "🔄 Restarting service..." | tee -a "$DEPLOY_LOG"
            sudo systemctl restart "$SERVICE_NAME"
            sleep 3

            # Quick health check
            if ! sudo systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "❌ Service failed. Rollback..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              sudo systemctl restart "$SERVICE_NAME"
              exit 1
            fi

            # Health endpoint check
            if ! curl -fsSL --max-time 10 https://adarshbhopal.in/api/health/ > /dev/null 2>&1; then
              echo "❌ Health check failed. Rollback..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              sudo systemctl restart "$SERVICE_NAME"
              exit 1
            fi

            echo "$NEW_COMMIT (quick-deploy)" > "$APP_DIR/.deploy_version"
            echo "$(date '+%Y-%m-%d %H:%M:%S')" >> "$APP_DIR/.deploy_version"

            echo "✅ Quick deploy done in ~2-3 min!" | tee -a "$DEPLOY_LOG"
