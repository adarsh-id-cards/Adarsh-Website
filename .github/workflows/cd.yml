# =============================================================================
# CD Pipeline — Production Deploy (Manual Trigger)
# Run manually after CI passes - full deploy with all checks
# =============================================================================

name: CD — Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm deployment'
        required: true
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: self-hosted
    if: ${{ false }}  # TEMP: CD paused

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"
            SERVICE_NAME="${{ secrets.SERVICE_NAME }}"
            PYTHON="$APP_DIR/venv/bin/python"
            PIP="$APP_DIR/venv/bin/pip"
            DEPLOY_LOG="$APP_DIR/deploy.log"

            echo "==================================================" | tee -a "$DEPLOY_LOG"
            echo "🚀 Deploy started: $(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$DEPLOY_LOG"
            echo "==================================================" | tee -a "$DEPLOY_LOG"

            cd "$APP_DIR"

            PREV_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREV_COMMIT" | tee -a "$DEPLOY_LOG"

            echo "Fetching latest code..." | tee -a "$DEPLOY_LOG"
            git fetch origin main
            git reset --hard origin/main

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: $NEW_COMMIT" | tee -a "$DEPLOY_LOG"

            echo "Installing system dependencies for WeasyPrint (skip if already present)..." | tee -a "$DEPLOY_LOG"
            if ! dpkg -s libpango-1.0-0 >/dev/null 2>&1; then
              sudo apt-get install -y --no-install-recommends \
                libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 libfontconfig1 \
                2>/dev/null || true
            else
              echo "WeasyPrint deps already installed, skipping." | tee -a "$DEPLOY_LOG"
            fi

            echo "Installing dependencies..." | tee -a "$DEPLOY_LOG"
            REQS_CHANGED=$(git diff "$PREV_COMMIT" HEAD -- requirements.txt | wc -l)
            if [ "$REQS_CHANGED" -gt "0" ] || [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
              $PIP install -r requirements.txt --quiet
            else
              echo "requirements.txt unchanged, skipping pip install." | tee -a "$DEPLOY_LOG"
            fi

            echo "Running Django checks..." | tee -a "$DEPLOY_LOG"
            if ! $PYTHON manage.py check --fail-level WARNING; then
              echo "❌ Django check failed. Rolling back..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              exit 1
            fi

            echo "Running migrations..." | tee -a "$DEPLOY_LOG"
            if ! $PYTHON manage.py migrate --no-input; then
              echo "❌ Migration failed. Rolling back..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              $PIP install -r requirements.txt --quiet
              $PYTHON manage.py migrate --no-input
              exit 1
            fi

            echo "Building JS/CSS bundles..." | tee -a "$DEPLOY_LOG"
            $PYTHON build_bundles.py

            echo "Collecting static files..." | tee -a "$DEPLOY_LOG"
            STATIC_CHANGED=$(git diff --name-only "$PREV_COMMIT" HEAD -- static/ templates/ | wc -l)
            if [ "$STATIC_CHANGED" -gt "0" ] || [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
              if ! $PYTHON manage.py collectstatic --no-input; then
                echo "❌ collectstatic failed. Rolling back..." | tee -a "$DEPLOY_LOG"
                git reset --hard "$PREV_COMMIT"
                exit 1
              fi
            else
              echo "No static/template changes, skipping collectstatic." | tee -a "$DEPLOY_LOG"
            fi

            echo "Restarting application..." | tee -a "$DEPLOY_LOG"
            sudo systemctl restart "$SERVICE_NAME"

            sleep 5

            echo "Checking service status..." | tee -a "$DEPLOY_LOG"
            if ! sudo systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "❌ Service not active. Rolling back..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              sudo systemctl restart "$SERVICE_NAME"
              exit 1
            fi

            echo "Running health check..." | tee -a "$DEPLOY_LOG"

            if ! curl -fsSL https://adarshbhopal.in/api/health/ > /dev/null; then
              echo "❌ Health check failed. Rolling back..." | tee -a "$DEPLOY_LOG"
              git reset --hard "$PREV_COMMIT"
              sudo systemctl restart "$SERVICE_NAME"
              exit 1
            fi

            echo "$NEW_COMMIT" > "$APP_DIR/.deploy_version"
            echo "$(date '+%Y-%m-%d %H:%M:%S')" >> "$APP_DIR/.deploy_version"

            echo "✅ Deploy successful!" | tee -a "$DEPLOY_LOG"
            echo "Finished at: $(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$DEPLOY_LOG"
            echo "" | tee -a "$DEPLOY_LOG"