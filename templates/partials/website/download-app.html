{% load static %}
<section class="download-app-section" id="download-app">
    <div class="hero-grid"></div>
    <div class="container">
        <div class="app-cta-flex">
            <!-- Image Side -->
            <div class="app-cta-image">
                <div class="mockup-wrapper">
                    <img src="{% static 'assets/cta-phone.png' %}" alt="Adarsh App Mockups" class="phones-mockup">
                </div>
            </div>
            
            <!-- Content Side -->
            <div class="app-cta-content">
                <h3>Download <span class="gradient-text">AdarshID</span> App for Free!</h3>
                <p>Manage your ID cards efficiently with the AdarshID app. Available now on our website and Google Play Store for seamless card management.</p>
                
                <div class="download-badges">
                    <a href="#" class="app-badge">
                        <i class="fa-brands fa-google-play"></i>
                        <div class="badge-text">
                            <span class="small">GET IT ON</span>
                            <span class="big">Google Play</span>
                        </div>
                    </a>
                    <a href="#" class="app-badge direct-download">
                        <i class="fa-solid fa-download"></i>
                        <div class="badge-text">
                            <span class="small">Download Now</span>
                            <span class="big">Direct APK</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
