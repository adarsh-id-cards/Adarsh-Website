{% load static %}
<!-- Download App CTA Section -->
<section class="download-app-section" id="download-app">
    <div class="container">
        <div class="download-app-wrap">
            <div class="download-app-content">
                <span class="download-app-badge">
                    <i class="fa-solid fa-mobile-screen-button"></i> Mobile App
                </span>
                <h2 class="download-app-title">Manage ID Cards <br>On The Go</h2>
                <p class="download-app-desc">
                    Download our mobile app to manage student ID cards, verify records,
                    and track progress  all from your phone. Fast, secure, and always accessible.
                </p>
                <div class="download-app-features">
                    <div class="download-app-feature">
                        <i class="fa-solid fa-bolt"></i>
                        <span>Instant Access</span>
                    </div>
                    <div class="download-app-feature">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>Secure & Private</span>
                    </div>
                    <div class="download-app-feature">
                        <i class="fa-solid fa-bell"></i>
                        <span>Real-time Updates</span>
                    </div>
                </div>
                <div class="download-app-actions">
                    <a id="openAppCta" href="{{ PANEL_URL|default:'' }}/app/" class="download-app-btn">
                        <i class="fa-solid fa-mobile-screen-button"></i>
                        <span>Open App Now</span>
                    </a>
                </div>
            </div>
            <div class="download-app-visual">
                <div class="download-app-phone">
                    <div class="phone-mockup">
                        <div class="phone-screen">
                            <div class="phone-status-bar">
                                <span class="status-time">9:41 AM</span>
                                <span class="status-punch-hole" aria-hidden="true"></span>
                                <span class="status-icons" aria-hidden="true">
                                    <i class="fa-solid fa-signal"></i>
                                    <i class="fa-solid fa-wifi"></i>
                                    <span class="icon-battery"><span class="icon-battery-level"></span></span>
                                </span>
                            </div>
                            <div class="phone-content">
                                <div class="phone-card"></div>
                                <div class="phone-card"></div>
                                <div class="phone-card short"></div>
                            </div>
                            <div class="download-app-qr">
                                <div class="download-app-qr-frame">
                                    <!-- QR code removed as no longer needed -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
(function () {
    var cap = window.Capacitor;
    var isNative = !!(cap && typeof cap.isNativePlatform === 'function' && cap.isNativePlatform());
    if (!isNative) return;

    var section = document.getElementById('download-app');
    if (section) {
        section.style.display = 'none';
    }
})();
</script>
