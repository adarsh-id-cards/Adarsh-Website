{% if is_impersonating %}
<!-- Impersonation Banner  -  fixed at top when Pro User is impersonating another user -->
<div id="impersonateBar"
     class="fixed top-0 left-0 right-0 z-[9999] flex items-center justify-between gap-3 px-4 py-2 text-white text-sm"
     style="background: linear-gradient(90deg, #e53e3e 0%, #c53030 100%); box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
  <div class="flex items-center gap-2">
    <i class="fa-solid fa-mask"></i>
    <span>
      Impersonating <strong>{{ user.get_full_name|default:user.username }}</strong>
      <span class="opacity-75">({{ user.get_role_display }})</span>
    </span>
  </div>
  <button onclick="window.__stopImpersonation()"
          class="flex items-center gap-1.5 px-3 py-1 bg-white/20 hover:bg-white/30 rounded text-xs font-semibold transition-colors">
    <i class="fa-solid fa-right-from-bracket"></i> Stop Impersonation
  </button>
</div>
<style>
  /* Push grid layout down when impersonation bar is visible */
  body.impersonating .sidebar { top: 36px; height: calc(100vh - 36px); }
  body.impersonating .main { margin-top: 36px; height: calc(100vh - 36px); }
</style>
<script>
  document.body.classList.add('impersonating');
  window.__stopImpersonation = function() {
    var csrfToken = document.querySelector('meta[name="csrf-token"]')?.content
                 || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    fetch('/panel/api/auth/impersonate/stop/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
      body: JSON.stringify({ next: window.location.pathname + window.location.search })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) { window.location.href = data.redirect_url || '/panel/'; }
      else { alert(data.message || 'Failed to stop impersonation.'); }
    })
    .catch(function() { alert('Network error. Please try again.'); });
  };
</script>
{% endif %}
