<!-- Modals (Gallery, Lightbox, Video) -->
<div class="product-gallery-modal" id="productGalleryModal" role="dialog" aria-modal="true" aria-labelledby="productGalleryTitle">
    <div class="product-gallery-content">
        <div class="product-gallery-header">
            <h3 id="productGalleryTitle">Items</h3>
            <div class="product-gallery-header-actions">
                <button class="product-gallery-share" id="productGalleryShare" aria-label="Share gallery">
                    <i class="fa-solid fa-share-nodes" aria-hidden="true"></i>
                </button>
                <button class="product-gallery-close" id="productGalleryClose" aria-label="Close gallery"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
            </div>
        </div>
        <div class="product-gallery-body">
            <div class="product-gallery-grid" id="productGalleryGrid"></div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Media preview">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close media preview"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous item"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></button>
    <button class="lightbox-nav lightbox-nav-next lightbox-next" id="lightboxNext" aria-label="Next item"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>
    <div class="lightbox-content">
        <div class="lightbox-stage">
            <img src="" id="lightboxImage" alt="Media preview">
            <video id="lightboxVideo" playsinline preload="metadata"></video>
            <button class="lightbox-video-toggle" id="lightboxVideoToggle" aria-label="Play or pause video">
                <i class="fa-solid fa-play" aria-hidden="true"></i>
            </button>
            <div class="lightbox-video-time" id="lightboxVideoTime">0:00 / 0:00</div>
        </div>
        <div class="lightbox-footer">
            <div class="lightbox-caption" id="lightboxCaption"></div>
            <div class="lightbox-counter" id="lightboxCounter"></div>
        </div>
    </div>
</div>

<div class="video-modal" id="videoModal" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="video-modal-content">
        <button class="video-modal-close" id="videoModalClose" aria-label="Close video"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
        <video id="modalVideo" src=""></video>
    </div>
</div>
